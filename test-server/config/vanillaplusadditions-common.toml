#VanillaPlusAdditions Module Configuration
#Enable debug logging for all modules (can be overridden by individual module settings)
globalDebugLogging = false
#Emergency workaround: suppress IndexOutOfBoundsException during structure start generation.
#Use only to keep servers running while isolating incompatible worldgen mods.
worldgenCrashGuardEnabled = false

	#Configuration for Debug Overlay module
	[modules.debug_overlay]
		#Whether the Debug Overlay module is enabled
		enabled = true
		#Debug logging mode for the Debug Overlay module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"

	#Configuration for Minecart Chunk Loading module
	[modules.minecart_chunk_loading]
		#Whether the Minecart Chunk Loading module is enabled
		enabled = true
		#Debug logging mode for the Minecart Chunk Loading module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Chunk radius (Chebyshev) force-loaded around an active loader rail.
		#0 = only the rail's own chunk; 1 = a 3x3 area; 2 = a 5x5 area.
		#This is the rolling-load LOOKAHEAD: a larger radius keeps a moving cart inside the
		#loaded region longer so the window rolls along with it. Default 2 (5x5).
		# Default: 2
		# Range: 0 ~ 8
		chunk_load_radius = 2
		#How long a loader rail stays active (keeps chunks loaded) after the last
		#minecart passed over it, in seconds.
		# Default: 15
		# Range: 1 ~ 300
		active_timeout_seconds = 15
		#Only force-load chunks while at least one player is online.
		#When the last player leaves, loading pauses; on server start / first join the
		#rail chunks that had carts are reloaded so stuck carts continue moving.
		#false = keep loading even with nobody online (e.g. perpetual loops).
		only_while_players_online = true

		[modules.minecart_chunk_loading.overlay]
			#Debug overlay: how many chunks around the player are scanned for loader
			#rails to draw permanent chunk borders for.
			# Default: 8
			# Range: 1 ~ 16
			chunk_border_scan_radius = 8
			#Debug overlay: vertical extent (blocks above/below the rail) of the
			#rendered chunk border band.
			# Default: 24
			# Range: 4 ~ 256
			chunk_border_vertical_span = 24

	#Configuration for Stationary Chunk Loader module
	[modules.stationary_chunk_loader]
		#Whether the Stationary Chunk Loader module is enabled
		enabled = true
		#Debug logging mode for the Stationary Chunk Loader module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Chunk radius (Chebyshev) force-loaded around a Chunk Anchor.
		#0 = only the anchor's own chunk; 1 = a 3x3 area; 2 = a 5x5 area.
		#Higher = more chunks kept loaded and ticking (more server load).
		# Default: 0
		# Range: 0 ~ 8
		chunk_load_radius = 0
		#Only keep anchor chunks loaded while at least one player is online.
		#When the last player leaves, anchors pause; on server start / first join the
		#anchored chunks are reloaded.
		#false = keep loading even with nobody online.
		only_while_players_online = true

	#Configuration for Hostile Zombified Piglins module
	[modules.hostile_zombified_piglins]
		#Whether the Hostile Zombified Piglins module is enabled
		enabled = true
		#Debug logging mode for the Hostile Zombified Piglins module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Range in blocks to detect players and become hostile
		# Default: 32
		# Range: 1 ~ 128
		detection_range = 32
		#How long zombified piglins stay angry in ticks (-1 for indefinite)
		# Default: 200
		# Range: > -1
		anger_duration = 200
		#Time in seconds before a zombified piglin can switch to a new nearest player target
		# Default: 5.0
		# Range: 0.0 ~ 1.7976931348623157E308
		target_switch_threshold = 5.0

	#Configuration for Wither Skeleton Enforcer module
	[modules.wither_skeleton]
		#Whether the Wither Skeleton Enforcer module is enabled
		enabled = true
		#Debug logging mode for the Wither Skeleton Enforcer module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"

	#Configuration for Mob Glow Command module
	[modules.mob_glow]
		#Whether the Mob Glow Command module is enabled
		enabled = true
		#Debug logging mode for the Mob Glow Command module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Default duration in seconds for glow effect when 'infinite' is specified (-1 for truly infinite)
		# Default: -1
		# Range: > -1
		default_duration = -1
		#Maximum allowed duration in seconds for glow effect (0 for no limit)
		# Default: 3600
		# Range: > 0
		max_duration = 3600
		#Whether the command requires operator permissions
		require_op = true
		#Maximum number of mobs that can be affected per command (0 for no limit)
		# Default: 100
		# Range: > 0
		max_mobs_per_command = 100

	#Configuration for Block Glow module
	[modules.block_glow]
		#Whether the Block Glow module is enabled
		enabled = true
		#Debug logging mode for the Block Glow module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Default search radius in blocks for /blockglow
		# Default: 24
		# Range: 1 ~ 128
		default_radius = 24
		#Maximum allowed radius in blocks for /blockglow
		# Default: 64
		# Range: 1 ~ 256
		max_radius = 64
		#Default glow duration in seconds (0 = infinite)
		# Default: 60
		# Range: > 0
		default_duration_seconds = 60
		#Maximum number of block outlines rendered per frame
		# Default: 512
		# Range: 16 ~ 8192
		max_highlights_per_frame = 512
		#Selection mode for which blocks are highlighted: nearest or scan_order
		selection_mode = "nearest"

		[modules.block_glow.outline_color]
			#Red component of the outline color
			# Default: 0.0
			# Range: 0.0 ~ 1.0
			red = 0.0
			#Green component of the outline color
			# Default: 1.0
			# Range: 0.0 ~ 1.0
			green = 1.0
			#Blue component of the outline color
			# Default: 1.0
			# Range: 0.0 ~ 1.0
			blue = 1.0
			#Alpha component of the outline color
			# Default: 1.0
			# Range: 0.0 ~ 1.0
			alpha = 1.0

	#Configuration for Better Mobs module
	[modules.better_mobs]
		#Whether the Better Mobs module is enabled
		enabled = true
