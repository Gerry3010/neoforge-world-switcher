		#Configuration for mobs spawned below Y=0 or in the Nether/End
		below_zero = ["GEAR_TYPES;gold;10", "GEAR_TYPES;iron;30", "GEAR_TYPES;leather;10", "GEAR_TYPES;diamond;30", "ARMOR_CHANCES;helmet;80", "ARMOR_CHANCES;chestplate;70", "ARMOR_CHANCES;leggings;65", "ARMOR_CHANCES;boots;60", "HELMET_ENCHANTMENTS;protection;30", "HELMET_ENCHANTMENTS;fire_protection;15", "HELMET_ENCHANTMENTS;blast_protection;15", "HELMET_ENCHANTMENTS;projectile_protection;15", "HELMET_ENCHANTMENTS;respiration;20", "HELMET_ENCHANTMENTS;aqua_affinity;15", "HELMET_ENCHANTMENTS;thorns;10", "WEAPON_ENCHANTMENTS;sharpness;25", "WEAPON_ENCHANTMENTS;fire_aspect;10", "WEAPON_ENCHANTMENTS;knockback;10", "WEAPON_ENCHANTMENTS;unbreaking;20", "WEAPON_ENCHANTMENTS;power;20", "WEAPON_ENCHANTMENTS;punch;10", "WEAPON_ENCHANTMENTS;flame;10", "CHESTPLATE_ENCHANTMENTS;protection;30", "CHESTPLATE_ENCHANTMENTS;fire_protection;15", "CHESTPLATE_ENCHANTMENTS;blast_protection;15", "CHESTPLATE_ENCHANTMENTS;projectile_protection;15", "CHESTPLATE_ENCHANTMENTS;thorns;10", "LEGGINGS_ENCHANTMENTS;protection;30", "LEGGINGS_ENCHANTMENTS;fire_protection;15", "LEGGINGS_ENCHANTMENTS;blast_protection;15", "LEGGINGS_ENCHANTMENTS;projectile_protection;15", "LEGGINGS_ENCHANTMENTS;thorns;10", "BOOTS_ENCHANTMENTS;protection;30", "BOOTS_ENCHANTMENTS;fire_protection;15", "BOOTS_ENCHANTMENTS;blast_protection;15", "BOOTS_ENCHANTMENTS;projectile_protection;15", "BOOTS_ENCHANTMENTS;feather_falling;20", "BOOTS_ENCHANTMENTS;thorns;10", "BOOTS_ENCHANTMENTS;depth_strider;10", "BOOTS_ENCHANTMENTS;frost_walker;10", "ENCHANTMENT_LEVELS;min_level;2", "ENCHANTMENT_LEVELS;max_level;4", "POTION_EFFECTS;speed;10", "POTION_EFFECTS;strength;10", "POTION_EFFECTS;haste;10", "POTION_EFFECTS;fire_resistance;10", "WEAPON_TYPES;iron;50", "WEAPON_TYPES;gold;20", "WEAPON_TYPES;diamond;30", "WEAPON_RANDOMIZER;minecraft:skeleton;sword;40", "WEAPON_RANDOMIZER;minecraft:skeleton;axe;30"]
