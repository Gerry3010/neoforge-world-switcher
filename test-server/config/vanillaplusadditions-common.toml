	#Configuration for Death Coordinates Announcer module
	[modules.death_coordinates]
		#Whether the Death Coordinates Announcer module is enabled
		enabled = true
		#Debug logging mode for the Death Coordinates Announcer module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"

	#Configuration for End Oxygen module
	[modules.end_oxygen]
		#Whether the End Oxygen module is enabled
		enabled = true
		#Debug logging mode for the End Oxygen module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#The number of ticks between each air depletion (1 = standard, higher = slower).
		# Default: 2
		# Range: 1 ~ 300
		air_consumption_interval = 2
		#Additional ticks added to the consumption interval per level of Water Breathing effect.
		# Default: 4
		# Range: 0 ~ 100
		water_breathing_effect_interval_bonus = 4
		#The amount of damage to apply when the player is out of air in the End.
		# Default: 2.0
		# Range: 0.5 ~ 20.0
		out_of_air_damage = 2.0
		#The interval (in ticks) at which damage is applied when out of air.
		# Default: 20
		# Range: 1 ~ 200
		damage_tick = 20

		[modules.end_oxygen.backtank]
			#The number of ticks between each backtank air depletion (0 to disable depletion).
			# Default: 20
			# Range: 0 ~ 1000
			backtank_depletion_rate = 20
			#Whether a diving helmet is required along with the backtank to breathe.
			requires_full_set = true

	#Configuration for Flying Fish module
	[modules.flying_fish]
		#Whether the Flying Fish module is enabled
		enabled = true
		#Debug logging mode for the Flying Fish module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#Auto-hop behaviour of the Flying Fish Boots.
		#  DEFAULT  - Automatic leaps when sprinting near the water surface (governed by leap_cooldown_ticks).
		#  ARCADE   - Leaps trigger any time the player touches water while sprinting; cooldown is halved for a fast, bouncy dolphin feel.
		#  REALISTIC - No automatic leaps; only the horizontal water-skim boost is applied.
		#Allowed Values: DEFAULT, ARCADE, REALISTIC
		leap_mode = "DEFAULT"
		#Horizontal speed boost applied while sprinting over or through water with Flying Fish Boots.
		# Default: 0.08
		# Range: 0.0 ~ 1.0
		boots_horizontal_boost = 0.08
		#Vertical launch strength applied when the boots trigger a flying-fish leap.
		# Default: 0.42
		# Range: 0.0 ~ 2.0
		boots_vertical_boost = 0.42
		#Maximum downward speed while gliding after a water leap. Lower values glide longer.
		# Default: 0.08
		# Range: 0.01 ~ 1.0
		max_glide_fall_speed = 0.08
		#Cooldown between automatic flying-fish leaps from the water surface.
		# Default: 14
		# Range: 1 ~ 200
		leap_cooldown_ticks = 14

	#Configuration for Stackables module
	[modules.stackables]
		#Whether the Stackables module is enabled
		enabled = true
		#Debug logging mode for the Stackables module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#List of item entries to make stackable. Each entry must use the format namespace:id:stack (e.g. minecraft:mushroom_stew:64).
		#The last part is the desired max stack size (1-64). If an item is not present it will be skipped.
		stackable_items = ["minecraft:mushroom_stew:64", "minecraft:rabbit_stew:64", "minecraft:beetroot_soup:64", "minecraft:suspicious_stew:64", "minecraft:ender_pearl:64", "toughasnails:dirty_water_bottle:64", "toughasnails:purified_water_bottle:64", "toughasnails:apple_juice:64", "toughasnails:cactus_juice:64", "toughasnails:chorus_fruit_juice:64", "toughasnails:glow_berry_juice:64", "toughasnails:melon_juice:64", "toughasnails:pumpkin_juice:64", "toughasnails:sweet_berry_juice:64", "toughasnails:ice_cream:64", "toughasnails:charc_os:64", "create:builders_tea:64"]
		#Default stack size for potions, splash potions, lingering potions, and tipped arrows.
		# Default: 64
		# Range: 1 ~ 64
		default_potion_stack_size = 64

	#Configuration for Haunted House module
	[modules.haunted_house]
		#Whether the Haunted House module is enabled
		enabled = false
		#Debug logging mode for the Haunted House module (AUTO = use global setting, ON = force enable, OFF = force disable)
		#Allowed Values: AUTO, ON, OFF
		debug_logging = "AUTO"
		#List of mobs to replace with the replacement entity in the format 'namespace:mob_id:replacement_rate'
		#Example: 'minecraft:witch:10' means 10% of witches will be replaced with murmurs
		target_mobs = ["minecraft:witch:10"]
		#List of structure IDs where mob replacements should occur
		#Example: 'dungeons_and_taverns:witch_villa'
		target_structures = ["nova_structures:witch_villa", "dungeons_and_taverns:witch_villa"]
		#Entity ID spawned as invisible replacement in target structures
		#Example: 'alexsmobs:murmur' or 'minecraft:witch'
		replacement_entity_id = "minecraft:witch"
		#Spawn tuning preset for haunted structures
		#Values: custom, balanced, structure_focused, courtyard
		#custom = use the individual tuning values below
		spawn_preset = "structure_focused"
		#Chance (0-100%) that a mob spawn in target structures will be replaced with a witch
		#This helps ensure more witches spawn in witch villas for replacement
		#Set to 0 to disable witch spawning boost
		# Default: 50.0
		# Range: 0.0 ~ 100.0
		witch_spawn_boost_chance = 50.0
		#Enable fog/blindness effect for players inside target structures
		#Creates a spooky atmosphere in haunted locations
		enable_fog_effect = true
		#Amplifier for the fog effect (0 = light fog, 1 = medium fog, 2+ = heavy fog)
		#Higher values create denser fog
		# Default: 0
		# Range: 0 ~ 5
		fog_effect_amplifier = 0
		#How far below terrain surface a spawn is treated as cave-like and blocked
		# Default: 6
		# Range: 0 ~ 64
		cave_depth_tolerance = 6
		#Horizontal search radius (in blocks) to detect nearby covered building areas
		# Default: 5
		# Range: 1 ~ 24
		sky_access_near_building_radius = 5
		#Chance (0-100%) to allow haunted spawns in open-sky spots near a covered area
		# Default: 15.0
		# Range: 0.0 ~ 100.0
		sky_access_around_building_chance = 15.0
		#How many attempts are made to spread haunted spawns away from clusters
		# Default: 8
		# Range: 1 ~ 64
		distribution_attempts = 8
		#Horizontal offset radius (in blocks) used when distributing haunted spawns
		# Default: 4
		# Range: 0 ~ 24
		distribution_radius = 4
		#Minimum distance to other living mobs when selecting distributed spawn positions
		# Default: 6
		# Range: 0 ~ 64
		min_distance_to_other_mobs = 6
		#Horizontal scan radius for block-material based cave/structure detection
		# Default: 2
		# Range: 1 ~ 8
		material_scan_horizontal_radius = 2
		#Vertical scan radius for block-material based cave/structure detection
		# Default: 1
		# Range: 0 ~ 4
		material_scan_vertical_radius = 1
		#Minimum number of cave-like blocks near a position to treat it as likely cave
		# Default: 8
		# Range: 1 ~ 128
		cave_material_threshold = 8
		#Minimum number of structure-like blocks near a position to treat it as house/garden area
		# Default: 4
		# Range: 1 ~ 128
		structure_material_threshold = 4
		#Explicit structure material blocks (namespace:block) used for house/garden detection
		#Wood/fence tags are handled separately; this list is for explicit blocks like cobble/stone bricks/paths
		structure_material_blocks = ["minecraft:cobblestone_stairs", "minecraft:cobblestone_slab", "minecraft:mossy_cobblestone_stairs", "minecraft:mossy_cobblestone_slab", "minecraft:stone_bricks", "minecraft:cracked_stone_bricks", "minecraft:mossy_stone_bricks", "minecraft:chiseled_stone_bricks", "minecraft:stone_brick_stairs", "minecraft:stone_brick_slab", "minecraft:stone_brick_wall", "minecraft:mossy_stone_brick_stairs", "minecraft:mossy_stone_brick_slab", "minecraft:mossy_stone_brick_wall", "minecraft:grass_block", "minecraft:dirt_path", "minecraft:podzol", "minecraft:coarse_dirt", "minecraft:moss_block"]
		#Explicit underground/cave material blocks (namespace:block) used for cave detection
		underground_material_blocks = ["minecraft:stone", "minecraft:deepslate", "minecraft:cobbled_deepslate", "minecraft:andesite", "minecraft:diorite", "minecraft:granite", "minecraft:tuff"]
		#Enable direct haunted spawns from cached indoor/garden areas (independent of vanilla spawn generator)
		enable_direct_area_spawning = true
		#Chance (0-100%) per interval to attempt a direct haunted spawn for a player in haunted areas
		# Default: 35.0
		# Range: 0.0 ~ 100.0
		direct_spawn_attempt_chance = 35.0
		#Tick interval for direct spawn attempts (20 ticks = 1 second)
		# Default: 40
		# Range: 20 ~ 1200
		direct_spawn_interval_ticks = 40
		#Chance (0-100%) that a direct haunted spawn becomes the configured replacement entity
		# Default: 85.0
		# Range: 0.0 ~ 100.0
		direct_spawn_replacement_chance = 85.0
		#How many cached spawn spots to sample when picking a direct haunted spawn
		# Default: 10
		# Range: 1 ~ 64
